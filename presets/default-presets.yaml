metadata:
  version: "1.0"
  description: Default export presets for Version Bot
presets:
  - id: sony_esrb
    name: SONY ESRB
    width: 1920
    height: 1080
    scalingMode: scale
    bitrate: 50000
    videoCodec: h264
    audioBitrate: 320
    audioCodec: aac
    container: mp4
    maxFileSizeMB: 0
    introSlate:
      enabled: true
    outroSlate:
      enabled: true
    overlay:
      enabled: true
      duration: 4
