name: Build macOS Distribution

on:
  workflow_dispatch:
    inputs:
      notarize:
        description: Build signed and notarized macOS artifacts (requires Apple and cert secrets)
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve signing/notarization mode
        shell: bash
        env:
          MAC_CSC_LINK_B64: ${{ secrets.MAC_CSC_LINK_B64 }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          HAS_CERT=false
          HAS_NOTARY=false

          if [ -n "$MAC_CSC_LINK_B64" ] && [ -n "$MAC_CSC_KEY_PASSWORD" ]; then
            HAS_CERT=true
          fi

          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            HAS_NOTARY=true
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.notarize }}" = "true" ]; then
            if [ "$HAS_CERT" != "true" ]; then
              echo "::error::Manual notarized build requested, but MAC_CSC_LINK_B64/MAC_CSC_KEY_PASSWORD secrets are missing"
              exit 1
            fi
            if [ "$HAS_NOTARY" != "true" ]; then
              echo "::error::Manual notarized build requested, but APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID secrets are missing"
              exit 1
            fi
          fi

          if [ "$HAS_CERT" = "true" ] && [ "$HAS_NOTARY" = "true" ]; then
            echo "MAC_SIGN_AND_NOTARIZE=true" >> "$GITHUB_ENV"
            echo "Using signed + notarized macOS build mode"
          else
            echo "MAC_SIGN_AND_NOTARIZE=false" >> "$GITHUB_ENV"
            echo "::warning::Signing/notarization secrets not fully configured; using unsigned macOS build mode"
          fi

      - name: Prepare macOS signing certificate
        if: ${{ env.MAC_SIGN_AND_NOTARIZE == 'true' }}
        shell: bash
        env:
          MAC_CSC_LINK_B64: ${{ secrets.MAC_CSC_LINK_B64 }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          CERT_PATH="$GITHUB_WORKSPACE/macos-signing-cert.p12"
          echo "$MAC_CSC_LINK_B64" | base64 --decode > "$CERT_PATH"

          {
            echo "CSC_LINK=$CERT_PATH"
            echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build unsigned macOS artifacts (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.notarize }}
        env:
          VITE_BUNDLE_URL: https://raw.githubusercontent.com/sfig916/Version_Bot/main/presets-bundle.json
        run: |
          npm run build
          npx electron-builder --mac dmg zip --universal --publish never

      - name: Build signed and notarized macOS artifacts (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.notarize && env.MAC_SIGN_AND_NOTARIZE == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_BUNDLE_URL: https://raw.githubusercontent.com/sfig916/Version_Bot/main/presets-bundle.json
        run: |
          npm run build
          npx electron-builder --mac dmg zip --universal --publish never

      - name: Build signed and notarized release (tag push)
        if: ${{ github.event_name != 'workflow_dispatch' && env.MAC_SIGN_AND_NOTARIZE == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_BUNDLE_URL: https://raw.githubusercontent.com/sfig916/Version_Bot/main/presets-bundle.json
        run: |
          npm run build
          npx electron-builder --mac dmg zip --universal --publish never

      - name: Build unsigned release (tag push)
        if: ${{ github.event_name != 'workflow_dispatch' && env.MAC_SIGN_AND_NOTARIZE != 'true' }}
        env:
          VITE_BUNDLE_URL: https://raw.githubusercontent.com/sfig916/Version_Bot/main/presets-bundle.json
        run: |
          npm run build
          npx electron-builder --mac dmg zip --universal --publish never

      - name: Publish release assets (tag push)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.dmg
            dist/*-mac.zip
            dist/*.blockmap
            dist/latest*.yml
          fail_on_unmatched_files: true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: version-bot-macos
          path: |
            dist/*.dmg
            dist/*-mac.zip
            dist/*.blockmap

      - name: Cleanup signing certificate
        if: always()
        shell: bash
        run: |
          rm -f "$GITHUB_WORKSPACE/macos-signing-cert.p12"
